"$schema" = 'https://starship.rs/config-schema.json'

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[aws]
disabled = true

format = """
${env_var.ZMX_SESSION}\
...
"""

[env_var.ZMX_SESSION]
symbol = " "
format = "[$symbol$env_value]($style) "
description = "zmx session name"
style = "bold magenta"
